version: "3.8"

services:
  db:
    image: mcr.microsoft.com/mssql/server:2019-latest
    environment:
      SA_PASSWORD: "Your_password123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P Your_password123 -Q 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 30

  migrations:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./:/workspace:cached
    working_dir: /workspace
    entrypoint: ["/bin/bash", "-c", "/workspace/scripts/run-migrations.sh \"Server=db;Database=BuilderAssistantDb;User Id=sa;Password=Your_password123;\""]

  api:
    build:
      context: .
      dockerfile: src/Api/Dockerfile
    depends_on:
      - db
      - migrations
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=BuilderAssistantDb;User Id=sa;Password=Your_password123;
    ports:
      - "5000:80"
    volumes:
      - ./:/workspace:cached
    command: ["dotnet", "run", "--project", "src/Api"]
